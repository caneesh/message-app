    <path d="M36 18 Q44 18 44 26 Q44 34 36 34" stroke="url(#coffeeGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Coffee Club text -->
  <text x="56" y="32" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="22" font-weight="600">
    <tspan fill="#6F4E37">Coffee</tspan><tspan fill="#1a1a2e"> Club</tspan>
  </text>
