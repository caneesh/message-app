<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48">
  <defs>
    <linearGradient id="coffeeGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6F4E37"/>
      <stop offset="100%" stop-color="#A67B5B"/>
    </linearGradient>
  </defs>
  <!-- Coffee Cup -->
  <g transform="translate(4, 4)">
    <!-- Steam lines -->
    <path d="M12 2 Q14 6 12 10" stroke="#A67B5B" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M20 0 Q22 5 20 10" stroke="#A67B5B" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M28 2 Q30 6 28 10" stroke="#A67B5B" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Cup body -->
    <path d="M4 14 L8 38 C8 40 10 42 14 42 L26 42 C30 42 32 40 32 38 L36 14 Z" fill="url(#coffeeGradient)"/>
